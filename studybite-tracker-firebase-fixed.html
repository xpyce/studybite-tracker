<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyBite Sales Tracker - Collaborative</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      color-scheme: light;
      --brand: #f97316;
      --ink: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --panel: #ffffff;
      --page: #f4f7fb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--page);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    input, textarea, select, button {
      font: inherit;
    }

    .app-shell {
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.06);
    }

    .field {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 10px 12px;
      background: #fff;
      color: var(--ink);
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .field:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.16);
      outline: none;
    }

    .field[readonly] {
      background: #f9fafb;
      color: #4b5563;
    }

    .label {
      display: block;
      color: #374151;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .btn {
      align-items: center;
      border: 1px solid transparent;
      border-radius: 8px;
      cursor: pointer;
      display: inline-flex;
      font-weight: 800;
      justify-content: center;
      min-height: 40px;
      padding: 9px 14px;
      transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.15s;
      white-space: nowrap;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      background: var(--brand);
      color: #fff;
    }
